<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotion Library | Sewing Emotions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Instrument+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=22">
</head>
<body class="editor-page library-page">
  <a class="last-step-button" href="index.html">Last Step</a>
  <main class="character-stage library-character-stage" aria-label="Emotion library chat">
    <section class="character-image-frame" aria-label="Saved emotion character image"></section>
    <section class="character-chat-bubble large-chat-bubble" aria-live="polite">
      <p>I'm here with the feelings you gave me.</p>
    </section>
    <form class="character-input-bar">
      <input class="character-text-input" type="text" autocomplete="off" aria-label="Message to saved emotion character">
      <button class="character-send-button" type="submit">Send</button>
      <a class="character-home-button" href="index.html">Return Home</a>
    </form>
  </main>

  <script src="emotion-data.js?v=22"></script>
  <script src="emo_library.js?v=22"></script>
</body>
</html>
