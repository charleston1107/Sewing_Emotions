<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meet Your Emotion | Sewing Emotions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Instrument+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=23">
</head>
<body class="editor-page character-page">
  <main class="character-stage" aria-label="Talk with emotion character">
    <section class="character-image-frame" aria-label="Emotion plushie image"></section>
    <section class="character-chat-bubble large-chat-bubble" aria-live="polite">
      <p>I am looking at the shape of what you made...</p>
    </section>
    <form class="character-input-bar">
      <input class="character-text-input" type="text" autocomplete="off" aria-label="Message to emotion character">
      <button class="character-send-button" type="submit">Send</button>
      <button class="character-finish-button" type="button">Finish</button>
    </form>
  </main>

  <script src="shared.js?v=23"></script>
  <script src="emotion-data.js?v=23"></script>
  <script src="emotion-insights.js?v=23"></script>
  <script src="character.js?v=23"></script>
</body>
</html>
