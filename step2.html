<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Choose Colors | Sewing Emotions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Instrument+Sans:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=19">
</head>
<body class="editor-page color-step-page">
  <a class="last-step-button" href="step1.html">Last Step</a>
  <main class="editor-stage" aria-label="Choose emotion shape colors">
    <aside class="editor-side-panel editor-side-left" aria-label="Left color palette">
      <div class="editor-color-gallery editor-color-gallery-left" aria-label="Left color gallery"></div>
    </aside>

    <section class="editor-frame" aria-label="Color selection frame">
      <div class="editor-surface color-editor-surface" aria-label="Saved shape canvas"></div>
    </section>

    <aside class="editor-side-panel editor-side-right" aria-label="Right color palette">
      <section class="instruction-cloud" aria-label="Color instructions">
        <div class="instruction-cloud-shape" aria-hidden="true">
          <span class="cloud-circle cloud-circle-1"></span>
          <span class="cloud-circle cloud-circle-2"></span>
          <span class="cloud-circle cloud-circle-3"></span>
          <span class="cloud-circle cloud-circle-4"></span>
          <span class="cloud-circle cloud-circle-5"></span>
          <span class="cloud-circle cloud-circle-6"></span>
        </div>
        <p class="instruction-cloud-text" aria-live="polite"></p>
        <button class="instruction-cloud-skip" type="button">skip</button>
      </section>
      <div class="editor-color-gallery editor-color-gallery-right" aria-label="Right color gallery"></div>
    </aside>

    <a class="finish-button editor-finish" href="step3.html">Finish</a>
  </main>

  <script src="shared.js?v=20"></script>
  <script src="step2.js?v=20"></script>
</body>
</html>
